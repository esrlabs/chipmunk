# Configuration required to run the parser in Chipmunk benchmarks.

# Example command to run parsing benchmarks from the repository root:
# ```sh
# CHIPMUNK_BENCH_SOURCE={input_file_path}.dlt \
# CHIPMUNK_BENCH_CONFIG={path_to_this_file}.toml \
# cargo bench -p processor --bench plugin_praser_producer --locked
# ```

# Path to the plugin WebAssembly (WASM) file.
# Can be absolute or relative to the `indexer` directory within the Chipmunk repository.
binary_path = "../../../../plugins/examples/rust/dlt_parser/target/wasm32-wasip1/release/dlt_parser.wasm"

# Plugin-specific configurations:

[[config]]
id = "log_level"
value.Dropdown = "Verbose"

[[config]]
id = "fibex_id"
value.Files = []

[[config]]
id = "storage_header_id"
value.Boolean = true
